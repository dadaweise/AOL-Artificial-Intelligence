<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Skin Condition Analyzer</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f4f9; display: flex; justify-content: center; padding-top: 50px; }
        .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 100%; }
        #preview { max-width: 100%; margin-top: 20px; border-radius: 8px; display: none; }
        .result { margin-top: 20px; padding: 15px; background: #e3f2fd; border-radius: 8px; display: none; }
        .warning { font-size: 0.8em; color: #666; margin-top: 20px; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 15px; width: 100%; font-size: 16px; }
        button:hover { background: #0056b3; }
        button:disabled { background: #cccccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="card">
    <h2>Skin Condition Analyzer</h2>
    <input type="file" id="imageInput" accept="image/*">
    <img id="preview" alt="Image Preview">
    <button id="uploadBtn" disabled>Analyze Image</button>

    <div id="resultBox" class="result">
        <h3 id="diagnosisText"></h3>
        <p>Confidence: <strong id="confidenceText"></strong>%</p>
    </div>

    <p class="warning">⚠️ Demo only. Not a substitute for professional medical advice.</p>
</div>

<script>
    const imageInput = document.getElementById('imageInput');
    const preview = document.getElementById('preview');
    const uploadBtn = document.getElementById('uploadBtn');
    const resultBox = document.getElementById('resultBox');
    const diagnosisText = document.getElementById('diagnosisText');
    const confidenceText = document.getElementById('confidenceText');

    // Show preview when an image is selected
    imageInput.addEventListener('change', function() {
        const file = this.files[0];
        if (file) {
            preview.src = URL.createObjectURL(file);
            preview.style.display = 'block';
            uploadBtn.disabled = false;
            resultBox.style.display = 'none'; // Hide old results
        }
    });

    // Handle the upload and API request
    uploadBtn.addEventListener('click', async () => {
        const file = imageInput.files[0];
        if (!file) return;

        uploadBtn.disabled = true;
        uploadBtn.innerText = "Analyzing...";

        const formData = new FormData();
        formData.append("file", file);

        try {
            // Send the POST request to our FastAPI backend
            const response = await fetch('/predict', {
                method: 'POST',
                body: formData
            });
            
            const data = await response.json();

            if (response.ok) {
                diagnosisText.innerText = data.diagnosis;
                confidenceText.innerText = data.confidence;
                resultBox.style.display = 'block';
            } else {
                alert("Error: " + data.detail);
            }
        } catch (error) {
            alert("Failed to connect to the API.");
        } finally {
            uploadBtn.innerText = "Analyze Image";
            uploadBtn.disabled = false;
        }
    });
</script>

</body>
</html>
